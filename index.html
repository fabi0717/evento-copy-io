<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento-Copy AI - Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .auth-message { min-height: 24px; text-align: center; font-weight: 500; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 flex items-center justify-center min-h-screen">

    <div id="app" class="w-full max-w-md p-8 space-y-6">
        
        <div id="signup-page">
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h2 class="text-3xl font-bold text-center mb-6">Start Your Free Trial</h2>
                <form id="signup-form" class="space-y-6">
                    <div id="signup-message" class="auth-message"></div>
                    <div><label for="signup-name">Full Name</label><input type="text" id="signup-name" class="mt-1 block w-full bg-slate-100 rounded-md p-2" required></div>
                    <div><label for="signup-email">Email Address</label><input type="email" id="signup-email" class="mt-1 block w-full bg-slate-100 rounded-md p-2" required></div>
                    <div><label for="signup-password">Create Password</label><input type="password" id="signup-password" class="mt-1 block w-full bg-slate-100 rounded-md p-2" required></div>
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700">Create Account</button>
                </form>
            </div>
        </div>

        <div id="generator-page" class="hidden">
             <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h2 id="welcome-message" class="text-2xl font-bold text-center mb-6"></h2>
                <div id="generations-counter" class="text-center mb-4"></div>
                <button id="generate-btn" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700">Generate Strategy</button>
                <button id="logout-btn" class="w-full mt-4 text-center text-indigo-600">Log Out</button>
             </div>
        </div>

        <div id="result-page" class="hidden">
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h2 class="text-2xl font-bold mb-4">Strategy Generated!</h2>
                <pre id="result-content" class="bg-slate-100 p-4 rounded-md overflow-x-auto whitespace-pre-wrap"></pre>
                <button id="start-over-btn" class="w-full mt-4 text-center text-indigo-600">Start Over</button>
            </div>
        </div>
    </div>

    <script type="module">
        // --- Firebase Imports ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyACcf5OFw4nBlwYPF_BZuW5fLAnmGAWxg4",
            authDomain: "evento-copy-ai-4527c.firebaseapp.com",
            projectId: "evento-copy-ai-4527c",
            storageBucket: "evento-copy-ai-4527c.firebasestorage.app",
            messagingSenderId: "1076478763329",
            appId: "1:1076478763329:web:22606685d87e8f131101c0",
            measurementId: "G-517FH1G8N1"
        };

        // --- Initialize Services ---
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- DOM Elements ---
        const pages = {
            signup: document.getElementById('signup-page'),
            generator: document.getElementById('generator-page'),
            result: document.getElementById('result-page')
        };
        const signupForm = document.getElementById('signup-form');
        const generateBtn = document.getElementById('generate-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const startOverBtn = document.getElementById('start-over-btn');

        let currentUser = null;
        let userGenerations = 0;
        let unsubscribe;

        // --- Core Logic ---
        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = user;
                const userDocRef = doc(db, 'users', user.uid);
                
                if (unsubscribe) unsubscribe(); // Detach previous listener
                
                unsubscribe = onSnapshot(userDocRef, (docSnap) => {
                    if (!docSnap.exists()) {
                        // Create user profile if it doesn't exist
                        setDoc(userDocRef, { email: user.email, name: user.displayName, freeGenerations: 1 });
                        userGenerations = 1;
                    } else {
                        userGenerations = docSnap.data().freeGenerations;
                    }
                    showGeneratorPage(user);
                });
            } else {
                currentUser = null;
                if (unsubscribe) unsubscribe();
                showSignupPage();
            }
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                // onAuthStateChanged will handle the rest
            } catch (error) {
                document.getElementById('signup-message').textContent = error.message;
            }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));
        
        generateBtn.addEventListener('click', async () => {
            if (userGenerations <= 0) {
                alert("You have no free generations left.");
                return;
            }

            generateBtn.textContent = "Generating...";
            generateBtn.disabled = true;

            try {
                const cloudFunctionUrl = "https://callgemini-bhomdt6fra-uc.a.run.app";
                const response = await fetch(cloudFunctionUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: "Generate a simple marketing plan for a coffee shop.",
                        isJson: true
                    }),
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const result = await response.json();
                
                // Show result
                document.getElementById('result-content').textContent = result.text;
                showResultPage();

                // Update generations in Firestore
                const userDocRef = doc(db, 'users', currentUser.uid);
                await updateDoc(userDocRef, { freeGenerations: 0 });

            } catch (error) {
                alert(`Generation failed: ${error.message}`);
            } finally {
                generateBtn.textContent = "Generate Strategy";
                generateBtn.disabled = false;
            }
        });

        startOverBtn.addEventListener('click', () => showGeneratorPage(currentUser));

        // --- Page Navigation ---
        function showPage(pageName) {
            Object.values(pages).forEach(page => page.style.display = 'none');
            if (pages[pageName]) pages[pageName].style.display = 'block';
        }

        function showSignupPage() {
            showPage('signup');
        }

        function showGeneratorPage(user) {
            document.getElementById('welcome-message').textContent = `Welcome, ${user.displayName}!`;
            document.getElementById('generations-counter').textContent = `You have ${userGenerations} generations left.`;
            showPage('generator');
        }

        function showResultPage() {
            showPage('result');
        }

    </script>
</body>
</html>
