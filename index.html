<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento-Copy AI - Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Poppins:wght@800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; } .logo-font { font-family: 'Poppins', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .auth-message { min-height: 24px; text-align: center; font-weight: 500; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="app" class="min-h-screen flex flex-col items-center p-4 md:p-8">
        <header class="w-full max-w-7xl mx-auto flex justify-between items-center py-4">
            <div class="inline-flex items-center group cursor-pointer">
                <span class="logo-font text-3xl font-extrabold text-slate-800">Evento-Copy AI</span>
            </div>
            <div id="auth-container" class="flex items-center space-x-4"></div>
        </header>
        <main class="w-full max-w-md mx-auto flex-grow flex flex-col justify-center">
            <div id="signup-page" class="hidden"><div class="bg-white p-8 rounded-3xl shadow-xl"><h2 class="text-3xl font-bold text-center mb-6">Start Your Free Trial</h2><form id="signup-form" class="space-y-6"><div id="signup-message" class="auth-message text-red-500"></div><div><label for="signup-name">Full Name</label><input type="text" id="signup-name" class="mt-1 block w-full bg-slate-100 rounded-md p-2" required></div><div><label for="signup-email">Email Address</label><input type="email" id="signup-email" class="mt-1 block w-full bg-slate-100 rounded-md p-2" required></div><div><label for="signup-password">Create Password</label><input type="password" id="signup-password" class="mt-1 block w-full bg-slate-100 rounded-md p-2" required></div><button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700">Create Account</button></form></div></div>
            <div id="logged-in-page" class="hidden"><div class="bg-white p-8 rounded-3xl shadow-xl text-center"><h2 id="welcome-message" class="text-2xl font-bold mb-6"></h2><p>Your app is connected to Firebase!</p><button id="logout-btn" class="w-full mt-4 text-center text-indigo-600">Log Out</button></div></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWi09jT79AEKn1bqW8Z1L10Ih9VNFTYrA",
            authDomain: "evento-copy-ai-4527c.firebaseapp.com",
            projectId: "evento-copy-ai-4527c",
            storageBucket: "evento-copy-ai-4527c.firebasestorage.app",
            messagingSenderId: "1076478763329",
            appId: "1:1076478763329:web:22606685d87e8f131101c0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const pages = {
            signup: document.getElementById('signup-page'),
            loggedIn: document.getElementById('logged-in-page')
        };
        const signupForm = document.getElementById('signup-form');
        const logoutBtn = document.getElementById('logout-btn');
        const welcomeMessage = document.getElementById('welcome-message');
        const signupMessage = document.getElementById('signup-message');

        const showPage = (pageName) => {
            Object.values(pages).forEach(page => page.classList.add('hidden'));
            if (pages[pageName]) pages[pageName].classList.remove('hidden');
        };

        onAuthStateChanged(auth, user => {
            if (user) {
                welcomeMessage.textContent = `Welcome, ${user.displayName || user.email}!`;
                showPage('loggedIn');
            } else {
                showPage('signup');
            }
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            signupMessage.textContent = '';
            const [name, email, password] = [document.getElementById('signup-name').value, document.getElementById('signup-email').value, document.getElementById('signup-password').value];
            if (password.length < 6) {
                signupMessage.textContent = 'Password must be at least 6 characters.';
                return;
            }
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(cred.user, { displayName: name });
                // onAuthStateChanged will handle UI change
            } catch (error) {
                console.error("Signup Error:", error);
                signupMessage.textContent = error.message;
            }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
